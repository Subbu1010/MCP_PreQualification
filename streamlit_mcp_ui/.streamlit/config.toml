# MCP references: (Streamlit UI runtime config)
# Purpose: Server bind, theme tokens, and browser defaults for a production-style console.

[server]
headless = true
address = "0.0.0.0"
port = 8501

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#1d4ed8"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f1f5f9"
textColor = "#0f172a"
font = "sans serif"
