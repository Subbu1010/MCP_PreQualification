# MCP references: (OpenShift Service — exposes MCP HTTP to cluster networking)
# Purpose: ClusterIP Service fronting `mortgage-mcp-server` pods.
apiVersion: v1
kind: Service
metadata:
  name: mortgage-mcp-server
spec:
  selector:
    app: mortgage-mcp-server
  ports:
    - name: http
      port: 80
      targetPort: http
